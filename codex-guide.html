        <script type="text/plain" id="guideMarkdown"># Codex 进阶查询使用手册

## 1. 适用场景

网站适合快速搜索已有单条规则和页面。

Codex 适合比较多个概念、组合多条规则和进行连续追问。

Codex 仍然只根据仓库中的交接资料回答，不代表产品负责人作出新决策。

## 2. 使用前准备

安装或打开 Codex。

使用自己的 ChatGPT 账号登录。

获取本仓库。推荐优先使用 GitHub Desktop 克隆仓库，也可以下载 ZIP 后解压。

仓库地址：[https://github.com/okylll/auth-handover](https://github.com/okylll/auth-handover)

## 3. 使用步骤

1. 在 Codex 中打开本地 `auth-handover` 文件夹。
2. 新建一个对话。
3. 在输入框中输入 `$`。
4. 从列表选择 `Skill Auth`，不要只手动输入普通文本。
5. 输入权限或流程问题并发送。

## 4. 示例问题

- 限制和回收有什么区别？
- 动态模板和静态模板有什么区别？
- 用户权限可能来自哪些地方？
- 用户组可以限制权限吗？
- 配置用户权限的完整流程在哪里？
- 创建编辑用户的 Pixso 页面在哪里？

## 5. 预期回答

回答一般包含：

- 结论
- 必要说明
- RULE 或 PAGE 来源
- 相关 Pixso 地址

## 6. 无记录问题

资料未记录时，Skill 会明确回答：

现有交接资料中没有相关记录，无法根据已有规则判断。

## 7. 常见问题

**输入 `$` 后看不到 Skill Auth**

确认打开的是 `auth-handover` 仓库，然后完全退出并重启 Codex。

**只出现普通文字 `$skill-auth`**

需要从 `$` 弹出的列表中选中 Skill，不要只手动输入普通文本。

**回答与规则不符**

确认 Skill 已被选中，并检查仓库是否为最新版本。

**Pixso 无法打开**

需要具备对应企业账号和页面权限。

**会看到交接人的私人资料吗**

不会。公开版 Skill 只包含本仓库 `.agents/skills/skill-auth/references/` 中允许交接的资料，不会看到交接人的私人 `workskills`、Codex 对话或个人资料。</script>
