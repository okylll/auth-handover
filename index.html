<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户与权限管理交接知识库</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap hero">
        <div>
          <p class="eyebrow">离职交接资料</p>
          <h1>用户与权限管理交接知识库</h1>
          <p class="intro">整理已确认的权限规则、流程页面和 Pixso 索引，供普通同事快速查询交接信息。</p>
        </div>
        <div class="stats" aria-label="资料统计">
          <div>
            <strong id="ruleCount">0</strong>
            <span>权限规则</span>
          </div>
          <div>
            <strong id="pageCount">0</strong>
            <span>流程索引</span>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap main">
      <section class="search-panel" aria-labelledby="searchTitle">
        <h2 id="searchTitle">查询交接知识</h2>
        <div class="search-row">
          <label class="visually-hidden" for="searchInput">搜索</label>
          <input id="searchInput" type="search" placeholder="输入权限问题、流程名称或关键词" autocomplete="off">
          <button id="clearSearch" type="button">清空</button>
        </div>
      </section>

      <nav class="tabs" aria-label="内容分类">
        <button class="tab is-active" type="button" data-view="rules">权限规则</button>
        <button class="tab" type="button" data-view="pages">流程索引</button>
      </nav>

      <section class="result-head" aria-live="polite">
        <div>
          <h2 id="resultTitle">全部权限规则</h2>
          <p id="resultMeta">展示已确认的权限问答。</p>
        </div>
      </section>

      <section id="results" class="results" aria-label="查询结果"></section>

      <section class="advanced-panel" aria-labelledby="advancedTitle">
        <div>
          <h2 id="advancedTitle">需要组合多个规则或进行复杂追问？</h2>
          <p>安装 Codex 并打开本仓库，可使用 Skill Auth 进行进阶查询。</p>
        </div>
        <div class="advanced-actions">
          <a href="docs/CODEX-USER-GUIDE.md">查看 Codex 使用手册</a>
          <a href="https://github.com/okylll/auth-handover" target="_blank" rel="noopener noreferrer">查看 GitHub 仓库</a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        本网站仅整理已确认的交接资料；未记录或待确认事项不作推断。
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
