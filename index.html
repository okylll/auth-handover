<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户与权限管理交接知识库</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap hero">
        <div>
          <p class="eyebrow">离职交接资料</p>
          <h1>用户与权限管理交接知识库</h1>
          <p class="intro">
            整理已确认的权限规则、流程页面和 Pixso 索引，提供快速查询能力。
            <span class="design-info" id="designInfo" tabindex="0" aria-label="设计稿维护说明">
              <span class="design-info-icon" aria-hidden="true">i</span>
              <span class="design-info-panel" id="designInfoPanel"></span>
            </span>
          </p>
          <div class="hero-advanced" aria-label="Codex 进阶查询">
            <p class="hero-advanced-label">权限Skill - Codex 进阶版</p>
            <p class="hero-advanced-copy">网站提供快速静态搜索，Codex拥有更机智的大脑，回答更复杂的问题</p>
            <div class="hero-advanced-actions">
              <a class="hero-guide-button" href="./codex-guide.html">安装及使用指南</a>
              <a class="hero-github-link" href="https://github.com/okylll/auth-handover" target="_blank" rel="noopener noreferrer">查看 GitHub</a>
            </div>
          </div>
        </div>
        <div class="stats" aria-label="资料统计">
          <div>
            <strong id="pageCount">0</strong>
            <span>主流程</span>
          </div>
          <div>
            <strong id="ruleCount">0</strong>
            <span>已有规则</span>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap main">
      <section class="search-panel" aria-labelledby="searchTitle">
        <h2 id="searchTitle">快速查询</h2>
        <div class="search-row">
          <div class="search-input-wrap">
            <label class="visually-hidden" for="searchInput">搜索</label>
            <input id="searchInput" type="text" placeholder="输入权限问题、流程名称或关键词" autocomplete="off">
            <button id="clearSearch" class="input-clear" type="button" aria-label="清空搜索" hidden>×</button>
          </div>
        </div>
      </section>

      <section class="search-results-block" id="searchResultsBlock" hidden>
        <h2 id="searchResultsTitle">查询结果 0条</h2>
        <section id="searchResults" class="results" aria-label="查询结果"></section>
      </section>

      <section class="overview-section" id="overviewSection">
        <section class="result-head" aria-live="polite">
          <div>
            <h2 id="resultTitle">索引与逻辑概览</h2>
            <p id="resultMeta"></p>
          </div>
          <button id="overviewToggle" class="overview-toggle" type="button" aria-expanded="false" aria-label="展开索引与逻辑概览">
            <span class="chevron" aria-hidden="true"></span>
          </button>
        </section>

        <div id="overviewBody">
          <nav class="tabs primary-tabs" aria-label="内容分类">
            <button class="tab is-active" type="button" data-view="pages">
              <span class="tab-label">设计稿索引</span>
              <span class="tab-count" data-count-for="pages">0</span>
            </button>
            <button class="tab" type="button" data-view="rules-overview">
              <span class="tab-label">规则概览</span>
              <span class="tab-count" data-count-for="rules-overview">0</span>
            </button>
          </nav>

          <nav class="tabs secondary-tabs" id="ruleSubtabs" aria-label="规则分类">
            <button class="tab is-active" type="button" data-rule-view="rules">
              <span class="tab-label">已确定</span>
              <span class="tab-count" data-count-for="rules">0</span>
            </button>
            <button class="tab" type="button" data-rule-view="pending">
              <span class="tab-label">待确定</span>
              <span class="tab-count" data-count-for="pending">0</span>
            </button>
          </nav>

          <section id="results" class="results" aria-label="索引与逻辑概览内容"></section>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        本网站仅整理已确认的交接资料；未记录或待确认事项不作推断。
      </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
